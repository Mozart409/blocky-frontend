version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    assignees:
      - Mozart409
  # Maintain Dockerfile base images (node, caddy) — where image CVEs land
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    assignees:
      - Mozart409
  # Maintain npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    assignees:
      - Mozart409
    # pnpm is used as package manager
    versioning-strategy: increase
