name: Cleanup untagged GHCR images

on:
  schedule:
    - cron: "0 3 * * *" # daily, 3am UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Manifest-aware cleanup: unlike actions/delete-package-versions, this
      # action understands multi-arch manifest lists and will NOT delete the
      # per-arch child images that a tag still references — it only removes
      # genuinely orphaned untagged versions.
      - name: Delete orphaned untagged images
        # Third-party action running with packages: write — pinned to a full
        # commit SHA so the mutable tag can't be repointed at malicious code.
        # Dependabot (github-actions ecosystem) will PR SHA bumps.
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          packages: blocky-frontend
          delete-untagged: true
          # Flip to true for a first, non-destructive run to see what it would remove.
          dry-run: false
