name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check and build
        run: pnpm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan all commits, not just HEAD.
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Biome (format, lint, import sorting)
        run: nix develop -c biome ci .

      - name: Secret scan (gitleaks)
        run: nix develop -c gitleaks git --redact=100

  docker-build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Setup Docker buildx with cross-compilation support
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
        env:
          BUILDX_BUILDER: default

      # Test Docker build for each platform
      - name: Test Docker build (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max